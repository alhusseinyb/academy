<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكوك الترحيل الشامل | أكاديمية الحسيني</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background: #111; color: white; padding: 40px; display: flex; justify-content: center; }
        .container { background: white; color: #2c3e50; padding: 30px; border-radius: 15px; width: 100%; max-width: 800px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #16a085; margin-top: 0; text-align: center; font-weight: 900; }
        label { font-weight: bold; display: block; margin: 15px 0 5px; }
        select, textarea { width: 100%; padding: 12px; border: 2px solid #bdc3c7; border-radius: 8px; box-sizing: border-box; font-family: 'Tajawal'; font-size: 14px; }
        textarea { resize: vertical; font-family: monospace; background: #fafafa; }
        .btn { background: #16a085; color: white; border: none; padding: 15px; width: 100%; font-size: 18px; font-weight: bold; font-family: 'Tajawal'; border-radius: 8px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #117a65; }
        .log-box { background: #f4f6f6; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-top: 20px; max-height: 200px; overflow-y: auto; font-size: 13px; font-family: monospace; text-align: left; direction: ltr; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🚀 مكوك ترحيل الامتحانات التلقائي الموحد</h2>
        <p style="text-align: center; color: #7f8c8d; font-size: 14px; margin-top: 0;">هذا المكوك مبرمج خصيصاً لتفكيك مصفوفة امتحاناتك الموحدة وضخها في قاعدة البيانات دفعة واحدة.</p>

        <label>1. اختر الصف الدراسي المعتمد لربط هذه الامتحانات:</label>
        <select id="gradeSelect"><option value="">جاري تحميل صفوف الأكاديمية... ⏳</option></select>

        <label>2. الصق مصفوفة `exams` كاملة من ملف prep1.html هنا:</label>
        <textarea id="oldArrayData" rows="12" placeholder="الصق الكود من أول القوس [ لحد قفلة القوس ] ..."></textarea>

        <button class="btn" onclick="migrateAllExamsAtOnce()">🚀 تشغيل مكوك الترحيل الشامل</button>
        
        <div class="log-box" id="logContainer">لوحة عمليات الترحيل لايف ستظهر هنا...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDOJMIXgFPJiQJmUvgR1sIv2NZ7_WJB4mY",
            authDomain: "alhusseiny-academy.firebaseapp.com",
            projectId: "alhusseiny-academy",
            storageBucket: "alhusseiny-academy.firebasestorage.app",
            messagingSenderId: "1048097240090",
            appId: "1:1048097240090:web:931635cccdb05213fd4da3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // تحميل الصفوف ديناميكياً
        db.collection("grades").get().then((snapshot) => {
            const select = document.getElementById("gradeSelect");
            let html = "<option value=''>-- اختر الصف الدراسي --</option>";
            snapshot.forEach(doc => { html += `<option value="${doc.id}">${doc.data().name}</option>`; });
            select.innerHTML = html;
        });

        function log(message, isSuccess = true) {
            const container = document.getElementById("logContainer");
            const color = isSuccess ? "green" : "red";
            container.innerHTML += `<div style="color:${color}">> ${message}</div>`;
            container.scrollTop = container.scrollHeight;
        }

        async function migrateAllExamsAtOnce() {
            const gradeId = document.getElementById("gradeSelect").value;
            const gradeName = document.getElementById("gradeSelect").options[document.getElementById("gradeSelect").selectedIndex]?.text;
            const rawData = document.getElementById("oldArrayData").value.trim();
            const logContainer = document.getElementById("logContainer");

            if(!gradeId || !rawData) {
                alert("⚠️ من فضلك اختر الصف الدراسي والصق مصفوفة الامتحانات أولاً!"); return;
            }

            logContainer.innerHTML = "=== بدء مهمة الترحيل الكبرى ===<br>";

            try {
                // تحويل النص البرمجي إلى مصفوفة حقيقية في المتصفح
                const parseArray = new Function("return " + rawData);
                const oldExamsList = parseArray();

                log(`تم التعرف على المصفوفة بنجاح. تحتوي على (${oldExamsList.length}) امتحانات كبرى.`);

                // المرور على كل امتحان في المصفوفة تلو الآخر
                for (let oldExam of oldExamsList) {
                    log(`جاري تفكيك وإعادة هيكلة امتحان: ${oldExam.title} ...`);
                    
                    let newQuestionsList = [];

                    // 1. ترحيل أسئلة الاستماع (Listening MCQ)
                    if(oldExam.listening && oldExam.listening.mcq) {
                        oldExam.listening.mcq.forEach(q => {
                            newQuestionsList.push({
                                type: "mcq",
                                questionText: `[Listening Section] - (Text: "${oldExam.listening.text}")\n\nQuestion: ${q.q}`,
                                options: q.options,
                                ans: parseInt(q.ans)
                            });
                        });
                    }
                    // ترحيل أسئلة الاستماع المقالية
                    if(oldExam.listening && oldExam.listening.open) {
                        oldExam.listening.open.forEach(q => {
                            newQuestionsList.push({
                                type: "fill",
                                questionText: `[Listening Section]\n\nQuestion: ${q.q}`,
                                ans: q.a
                            });
                        });
                    }

                    // 2. ترحيل أسئلة المفردات والجرامر (Vocabulary MCQ)
                    if(oldExam.reading && oldExam.reading.vocab_mcq) {
                        oldExam.reading.vocab_mcq.forEach(q => {
                            newQuestionsList.push({
                                type: "mcq",
                                questionText: q.q,
                                options: q.options,
                                ans: parseInt(q.ans)
                            });
                        });
                    }

                    // 3. ترحيل أسئلة أكمل الفراغات (Fill in)
                    if(oldExam.reading && oldExam.reading.fill_in) {
                        let fill = oldExam.reading.fill_in;
                        newQuestionsList.push({
                            type: "text",
                            questionText: `[Fill in the spaces using: ${fill.words.join(' - ')}]\n\n${fill.text}\n\n(Write answers sequentially separated by spaces)`,
                            ans: fill.answers.join(' ')
                        });
                    }

                    // 4. ترحيل قطعة الفهم (Comprehension)
                    if(oldExam.reading && oldExam.reading.comprehension) {
                        let comp = oldExam.reading.comprehension;
                        if(comp.mcq) {
                            comp.mcq.forEach(q => {
                                newQuestionsList.push({
                                    type: "mcq",
                                    questionText: `[Comprehension Passage: "${comp.text}"]\n\nQuestion: ${q.q}`,
                                    options: q.options,
                                    ans: parseInt(q.ans)
                                });
                            });
                        }
                        if(comp.open) {
                            comp.open.forEach(q => {
                                newQuestionsList.push({
                                    type: "fill",
                                    questionText: `[Comprehension Passage]\n\nQuestion: ${q.q}`,
                                    ans: q.a
                                });
                            });
                        }
                    }

                    // 5. ترحيل أسئلة القصة (Story)
                    if(oldExam.reading && oldExam.reading.story) {
                        let story = oldExam.reading.story;
                        if(story.tf) {
                            story.tf.forEach(q => {
                                newQuestionsList.push({
                                    type: "mcq",
                                    questionText: `[Story Section - True or False]: ${q.q}`,
                                    options: ["True (T)", "False (F)"],
                                    ans: q.ans === 'T' ? 0 : 1
                                });
                            });
                        }
                        if(story.open) {
                            story.open.forEach(q => {
                                newQuestionsList.push({
                                    type: "fill",
                                    questionText: `[Story Section]: ${q.q}`,
                                    ans: q.a
                                });
                            });
                        }
                    }

                    // 6. ترحيل أسئلة الكتابة وإعادة الصياغة (Rewrite & Dialogue & Paragraph)
                    if(oldExam.writing) {
                        if(oldExam.writing.rewrite) {
                            oldExam.writing.rewrite.forEach(q => {
                                newQuestionsList.push({
                                    type: "fill",
                                    questionText: `[Rewrite the sentence using bracket words]:\n\n${q.q}`,
                                    ans: q.a
                                });
                            });
                        }
                        if(oldExam.writing.dialogue) {
                            let dial = oldExam.writing.dialogue;
                            newQuestionsList.push({
                                type: "text",
                                questionText: `[Complete the Dialogue - Situation: ${dial.situation}]\n\n${dial.lines.join('\n')}\n\n(Write answers sequentially for 1 and 2)`,
                                ans: dial.answers.join(' / ')
                            });
                        }
                        if(oldExam.writing.paragraph) {
                            newQuestionsList.push({
                                type: "text",
                                questionText: `[Write a paragraph on]: "${oldExam.writing.paragraph}"`,
                                ans: "Review by Master"
                            });
                        }
                    }

                    // حفظ هذا الامتحان بعد إعادة هيكلته في السيرفر
                    await db.collection("exams").add({
                        title: oldExam.title,
                        gradeId: gradeId,
                        gradeName: gradeName,
                        unit: oldExam.id,
                        questions: newQuestionsList,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    log(`🚀 تم بنجاح ترحيل ونشر امتحان [${oldExam.title}] وعبرت أسئلته الخزنة!`, true);
                }

                log("🎉 مبروووووك يا مستر! تم ترحيل الـ 8 امتحانات بالكامل بنجاح ساحق، ودخلوا الخزنة أوتوماتيك دون أي عك!");
                alert("🎉 نجاح باهر! تم ترحيل المصفوفة بالكامل بنجاح!");

            } catch(e) {
                log(`❌ خطأ كارثي أثناء الترحيل: ${e.message}`, false);
                console.error(e);
            }
        }
    </script>
</body>
</html>
