<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكوك الترحيل المطور 2.0 | أكاديمية الحسيني</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #1a1a2e; color: white; padding: 40px; display: flex; justify-content: center; }
        .container { background: white; color: #2c3e50; padding: 30px; border-radius: 15px; width: 100%; max-width: 800px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #e94560; margin-top: 0; text-align: center; font-weight: 900; }
        label { font-weight: bold; display: block; margin: 15px 0 5px; }
        select, textarea { width: 100%; padding: 12px; border: 2px solid #bdc3c7; border-radius: 8px; box-sizing: border-box; font-family: 'Tajawal'; }
        textarea { resize: vertical; font-family: monospace; background: #fafafa; }
        .btn { background: #e94560; color: white; border: none; padding: 15px; width: 100%; font-size: 18px; font-weight: bold; font-family: 'Tajawal'; border-radius: 8px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #cc3750; }
        .log-box { background: #f4f6f6; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-top: 20px; max-height: 200px; overflow-y: auto; font-size: 13px; font-family: monospace; text-align: left; direction: ltr; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🚀 مكوك الترحيل المطور (علاج مشكلة الترتيب والفتح)</h2>
        <p style="text-align: center; color: #7f8c8d; font-size: 14px;">هذه النسخة تضمن تحويل كافة أنواع الأسئلة (سواء فردية أو زوجية) إلى نظام موحد يقبله كود الطالب بدون أي تهنيج.</p>

        <label>1. اختر الصف الدراسي:</label>
        <select id="gradeSelect"><option value="">جاري التحميل...</option></select>

        <label>2. الصق مصفوفة `exams` كاملة هنا:</label>
        <textarea id="oldArrayData" rows="12" placeholder="الصق المصفوفة كاملة هنا..."></textarea>

        <button class="btn" onclick="migrateAllExamsAtOnce()">🚀 تشغيل الترحيل الآمن والموحد</button>
        <div class="log-box" id="logContainer">لوحة العمليات لايف...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDOJMIXgFPJiQJmUvgR1sIv2NZ7_WJB4mY",
            authDomain: "alhusseiny-academy.firebaseapp.com",
            projectId: "alhusseiny-academy",
            storageBucket: "alhusseiny-academy.firebasestorage.app",
            messagingSenderId: "1048097240090",
            appId: "1:1048097240090:web:931635cccdb05213fd4da3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("grades").get().then((snapshot) => {
            const select = document.getElementById("gradeSelect");
            let html = "<option value=''>-- اختر الصف الدراسي --</option>";
            snapshot.forEach(doc => { html += `<option value="${doc.id}">${doc.data().name}</option>`; });
            select.innerHTML = html;
        });

        function log(message, isSuccess = true) {
            const container = document.getElementById("logContainer");
            container.innerHTML += `<div style="color:${isSuccess ? 'green' : 'red'}">> ${message}</div>`;
            container.scrollTop = container.scrollHeight;
        }

        async function migrateAllExamsAtOnce() {
            const gradeId = document.getElementById("gradeSelect").value;
            const gradeName = document.getElementById("gradeSelect").options[document.getElementById("gradeSelect").selectedIndex]?.text;
            const rawData = document.getElementById("oldArrayData").value.trim();

            if(!gradeId || !rawData) { alert("املاً البيانات أولاً!"); return; }

            try {
                const parseArray = new Function("return " + rawData);
                const oldExamsList = parseArray();

                for (let oldExam of oldExamsList) {
                    log(`جاري معالجة وتوحيد: ${oldExam.title}...`);
                    let newQuestionsList = [];

                    // هندسة وتأمين كود الأسئلة ليعمل على أي شاشة طالب:
                    
                    // 1. Listening
                    if(oldExam.listening) {
                        let textContext = oldExam.listening.text || "";
                        if(oldExam.listening.mcq) {
                            oldExam.listening.mcq.forEach(q => {
                                newQuestionsList.push({
                                    type: "mcq",
                                    questionText: `(Listening Section)\nText Context: ${textContext}\n\nQuestion: ${q.q || q.question}`,
                                    options: q.options || [q.a, q.b, q.c, q.d],
                                    ans: q.ans !== undefined ? parseInt(q.ans) : (q.correct === 'a' ? 0 : q.correct === 'b' ? 1 : q.correct === 'c' ? 2 : 3)
                                });
                            });
                        }
                    }

                    // 2. Reading / Vocab & Grammar (الأساسي اللي كان بيخلي وحدات تفتح ووحدات تقفل)
                    if(oldExam.reading) {
                        // لو النظام عادي (vocab_mcq)
                        if(oldExam.reading.vocab_mcq) {
                            oldExam.reading.vocab_mcq.forEach(q => {
                                newQuestionsList.push({
                                    type: "mcq",
                                    questionText: q.q || q.question,
                                    options: q.options || [q.a, q.b, q.c, q.d],
                                    ans: q.ans !== undefined ? parseInt(q.ans) : (q.correct === 'a' ? 0 : q.correct === 'b' ? 1 : q.correct === 'c' ? 2 : 3)
                                });
                            });
                        }
                        // دعم إضافي لو المصفوفة في بعض الوحدات كانت تحتوي على الأسئلة مباشرة جوة مصفوفة تسمى questions
                        if(oldExam.questions) {
                            oldExam.questions.forEach(q => {
                                newQuestionsList.push({
                                    type: "mcq",
                                    questionText: q.question || q.q,
                                    options: q.options || [q.a, q.b, q.c, q.d],
                                    ans: q.ans !== undefined ? parseInt(q.ans) : (q.correct === 'a' ? 0 : q.correct === 'b' ? 1 : q.correct === 'c' ? 2 : 3)
                                });
                            });
                        }
                    }

                    // الاحتياط النهائي: لو الامتحان جاي على شكل مصفوفة أسئلة مباشرة برة الـ reading
                    if(!oldExam.reading && oldExam.questions) {
                        oldExam.questions.forEach(q => {
                            newQuestionsList.push({
                                type: "mcq",
                                questionText: q.question || q.q,
                                options: q.options || [q.a, q.b, q.c, q.d],
                                ans: q.ans !== undefined ? parseInt(q.ans) : (q.correct === 'a' ? 0 : q.correct === 'b' ? 1 : q.correct === 'c' ? 2 : 3)
                                                                });
                            });
                        }

                    // رفع الامتحان الموحد والآمن
                    if(newQuestionsList.length > 0) {
                        await db.collection("exams").add({
                            title: oldExam.title,
                            gradeId: gradeId,
                            gradeName: gradeName,
                            unit: oldExam.id || "general",
                            questions: newQuestionsList,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        log(`✅ تم رفع وتوحيد [${oldExam.title}] بنجاح وأصبح جاهزاً للطالب!`, true);
                    } else {
                        log(`⚠️ الامتحان [${oldExam.title}] لم يحتوي على أسئلة متوافقة لتمريرها.`, false);
                    }
                }
                log("🎉 انتهت العملية! جرب تفتح كلاس روم الطالب الآن.");
            } catch(e) {
                log(`❌ خطأ: ${e.message}`, false);
            }
        }
    </script>
</body>
</html>
