                <p>اضغط للبدء</p>
            </div>
        `).join('');
    }

    }

        document.getElementById("quizTitle").innerText = activeExam.title;
        
        let html = "";
        
        html += `<div class="question-section"><h3>A. Listening</h3><button onclick="playAudioText()">🔊 Listen</button>`;
        activeExam.listening.mcq.forEach((q, i) => {
            let opts = shuffle([...q.options.map((t, idx) => ({t, idx}))]);
            html += `<p>${i+1}. ${q.q}</p><div class="options-grid req-radio" data-name="l_mcq_${i}">` + 
                    opts.map(o => `<label class="option-label"><input type="radio" name="l_mcq_${i}" value="${o.idx}"> ${o.t}</label>`).join('') + `</div>`;
        });
        activeExam.listening.open.forEach((q, i) => { html += `<p>${i+3}. ${q.q}</p><input type="text" class="req-input" data-q="${q.q}" data-model="${q.a}" placeholder="Write your answer...">`; });
        html += `</div>`;

        html += `<div class="question-section"><h3>B. Reading</h3>`;
        activeExam.reading.vocab_mcq.forEach((q, i) => {
            let opts = shuffle([...q.options.map((t, idx) => ({t, idx}))]);
            html += `<p>${i+1}. ${q.q}</p><div class="options-grid req-radio" data-name="v_mcq_${i}">` + 
                    opts.map(o => `<label class="option-label"><input type="radio" name="v_mcq_${i}" value="${o.idx}"> ${o.t}</label>`).join('') + `</div>`;
        });
        html += `<p>Complete: ${activeExam.reading.fill_in.words.map(w=>`[${w}]`).join(' ')}</p><p>${activeExam.reading.fill_in.text}</p><div style="display:flex; gap:10px; flex-wrap:wrap;">`;
        activeExam.reading.fill_in.answers.forEach((a, i) => { html += `<input type="text" class="req-input" data-q="Fill in ${i+1}" data-model="${a}" placeholder="(${i+1})" style="width:calc(50% - 5px);">`; });
        html += `</div>`;
        html += `<h4 style="margin-top:20px;">Comprehension</h4><p style="background:#f9f9f9; padding:15px; border-radius:8px;">${activeExam.reading.comprehension.text}</p>`;
        activeExam.reading.comprehension.mcq.forEach((q, i) => {
            let opts = shuffle([...q.options.map((t, idx) => ({t, idx}))]);
            html += `<p>${q.q}</p><div class="options-grid req-radio" data-name="c_mcq_${i}">` + 
                    opts.map(o => `<label class="option-label"><input type="radio" name="c_mcq_${i}" value="${o.idx}"> ${o.t}</label>`).join('') + `</div>`;
        });
        activeExam.reading.comprehension.open.forEach((q, i) => { html += `<p>${q.q}</p><input type="text" class="req-input" data-q="${q.q}" data-model="${q.a}">`; });
        
        if(activeExam.reading.story) {
            html += `<h4 style="margin-top:20px;">Story</h4>`;
            activeExam.reading.story.tf.forEach((q, i) => { html += `<div style="display:flex; justify-content:space-between; padding:10px; background:#f8f9fa;"><span>${q.q}</span><select class="req-input" data-q="${q.q}" data-model="${q.ans}"><option value="">--</option><option value="T">T</option><option value="F">F</option></select></div>`; });
            activeExam.reading.story.open.forEach((q, i) => { html += `<p>${q.q}</p><input type="text" class="req-input" data-q="${q.q}" data-model="${q.a}">`; });
        }
        html += `</div>`;

        html += `<div class="question-section"><h3>C. Writing</h3>`;
        activeExam.writing.rewrite.forEach((q, i) => { html += `<p>${q.q}</p><input type="text" class="req-input" data-q="Rewrite ${i+1}" data-model="${q.a}">`; });
        html += `<p>Dialogue: ${activeExam.writing.dialogue.situation}</p><div style="background:#f9f9f9; padding:10px; line-height:2;">${activeExam.writing.dialogue.lines.join('<br>')}</div>`;
        activeExam.writing.dialogue.answers.forEach((a, i) => { html += `<input type="text" class="req-input" data-q="Dialog ${i+1}" data-model="${a}" placeholder="(${i+1})">`; });
        html += `<p>Paragraph: ${activeExam.writing.paragraph}</p><textarea class="req-input" data-q="Paragraph" data-model="Review by Master" rows="4"></textarea></div>`;

        document.getElementById("quizContent").innerHTML = html;
        window.scrollTo(0,0);
    }

    function playAudioText() {
        let ut = new SpeechSynthesisUtterance(activeExam.listening.text);
        ut.lang = 'en-US'; window.speechSynthesis.speak(ut);
    }

    function finishExam() {
        let valid = true;
        document.querySelectorAll(".req-radio").forEach(g => {
            if(!document.querySelector(`input[name="${g.dataset.name}"]:checked`)) { g.style.border="2px solid red"; g.style.background="#fdedec"; valid=false; }
            else { g.style.border="none"; g.style.background="transparent"; }
        });
        document.querySelectorAll(".req-input").forEach(i => {
            if(!i.value.trim()) { i.style.borderColor="red"; i.style.background="#fdedec"; valid=false; }
            else { i.style.borderColor="#bdc3c7"; i.style.background="transparent"; }
        });
        if(!valid) { alert("⚠️ أجب على جميع الأسئلة المظللة بالأحمر أولاً!"); return; }

        let score = 0, total = 0, reviewHtml = "", reportForDocs = "=== 🎯 تقرير الإجابات التفصيلي ===\n\n";
        
        function check(student, model) {
            if(model === "Review by Master") return true; 
            let s = student.toLowerCase().trim(), m = model.toLowerCase().trim();
            if(s === m) return true;
            let keywords = m.split(' ').filter(w => w.length > 2);
            let matchCount = keywords.filter(w => s.includes(w)).length;
            return keywords.length > 0 && matchCount >= Math.ceil(keywords.length / 2);
        }

        function gradeMCQ(prefix, qList) {
            if(!qList) return;
            qList.forEach((q, i) => {
                total++;
                let sel = document.querySelector(`input[name="${prefix}_${i}"]:checked`);
                let isCorrect = parseInt(sel.value) === q.ans;
                if(isCorrect) score++;
                let studentAns = q.options[parseInt(sel.value)];
                let modelAns = q.options[q.ans];

                reviewHtml += `<div class="review-item ${isCorrect?'review-correct':'review-wrong'}"><b>س: ${q.q}</b><br>إجابتك: ${studentAns}<br>${isCorrect?'':'<span class="correct-ans-text">النموذج: '+modelAns+'</span>'}</div>`;
                reportForDocs += (isCorrect ? "✅ [1/1] " : "❌ [0/1] ") + "س: " + q.q + "\n   - إجابة الطالب: " + studentAns + "\n   - الإجابة الصحيحة: " + modelAns + "\n\n";
            });
        }
        
        if(activeExam.listening && activeExam.listening.mcq) gradeMCQ('l_mcq', activeExam.listening.mcq);
        if(activeExam.reading && activeExam.reading.vocab_mcq) gradeMCQ('v_mcq', activeExam.reading.vocab_mcq);
        if(activeExam.reading && activeExam.reading.comprehension && activeExam.reading.comprehension.mcq) gradeMCQ('c_mcq', activeExam.reading.comprehension.mcq);

        document.querySelectorAll(".req-input").forEach(inp => {
            total++;
            let isCorrect = check(inp.value, inp.dataset.model);
            if(isCorrect) score++;
            
            reviewHtml += `<div class="review-item ${isCorrect?'review-correct':'review-wrong'}"><b>س: ${inp.dataset.q}</b><br>إجابتك: ${inp.value}<br>${isCorrect?'':'<span class="correct-ans-text">النموذج: '+inp.dataset.model+'</span>'}</div>`;
            reportForDocs += (isCorrect ? "✅ [1/1] " : "❌ [0/1] ") + "س: " + inp.dataset.q + "\n   - إجابة الطالب: " + inp.value + "\n   - الإجابة النموذجية: " + inp.dataset.model + "\n\n";
        });

        var btn = document.getElementById("submitBtn");
        btn.innerText = "جاري الإرسال لتقييم المستر..."; btn.disabled = true;

        fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({name: currentStudent, exam: activeExam.title, score: score+"/"+total, report: reportForDocs}) })
        .then(() => {
            document.getElementById("quizScreen").style.display="none";
            document.getElementById("reviewScreen").style.display="block";
            document.getElementById("scoreDisplay").innerText = score + " / " + total;
            document.getElementById("reviewContent").innerHTML = reviewHtml;
            window.scrollTo(0,0);
        }).catch(() => { alert("تم الحفظ بنجاح!"); goBack(); btn.disabled=false; });
    }

    function goBack() { document.getElementById("quizScreen").style.display="none"; document.getElementById("mainMenu").style.display="block"; }
    function goBackFromReview() { document.getElementById("reviewScreen").style.display="none"; document.getElementById("mainMenu").style.display="block"; }
</script>
</body>
</html>
