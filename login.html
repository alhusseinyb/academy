<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدخول | أكاديمية مستر الحسيني</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-auth-compat.js"></script>

    <style>
        :root { --primary: #1a252f; --secondary: #2c3e50; --accent: #e67e22; --teal: #0a7c6e; --bg: #ecf0f1; --text: #2c3e50; }
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: var(--text); margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .auth-container { background: white; width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); overflow: hidden; position: relative; }
        .auth-header { background: var(--teal); color: white; text-align: center; padding: 30px 20px; }
        .auth-header h2 { margin: 0; font-size: 2em; }
        .auth-header p { margin: 10px 0 0 0; opacity: 0.9; }
        
        .tabs { display: flex; cursor: pointer; background: #f8f9fa; border-bottom: 2px solid #eee; }
        .tab { flex: 1; text-align: center; padding: 15px; font-weight: bold; color: #7f8c8d; transition: 0.3s; }
        .tab.active { background: white; color: var(--teal); border-bottom: 3px solid var(--teal); }
        
        .form-box { padding: 30px; display: none; animation: fadeIn 0.4s; }
        .form-box.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--secondary); font-size: 14px;}
        .input-group input { width: 100%; padding: 12px; border: 2px solid #bdc3c7; border-radius: 8px; font-size: 15px; font-family: 'Tajawal'; box-sizing: border-box; transition: 0.3s; }
        .input-group input:focus { border-color: var(--teal); outline: none; }
        
        .btn-submit { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { background: #d35400; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(230, 126, 34, 0.3); }
        
        .message { margin-top: 15px; text-align: center; font-size: 14px; font-weight: bold; }
        .msg-error { color: #c0392b; }
        .msg-success { color: #27ae60; }
        
        .back-home { display: block; text-align: center; margin-top: 20px; color: #95a5a6; text-decoration: none; font-size: 14px; transition: 0.3s; padding-bottom: 20px;}
        .back-home:hover { color: var(--primary); }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-header">
        <div style="font-size: 40px; margin-bottom: 10px;">👑</div>
        <h2>بوابة الأكاديمية</h2>
        <p>سجل دخولك لتبدأ رحلة التفوق</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">تسجيل الدخول</div>
        <div class="tab" onclick="switchTab('register')">حساب جديد</div>
    </div>

    <div id="loginForm" class="form-box active">
        <div class="input-group">
            <label>البريد الإلكتروني (الإيميل)</label>
            <input type="email" id="loginEmail" placeholder="example@gmail.com">
        </div>
        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="loginPassword" placeholder="********">
        </div>
        <button class="btn-submit" onclick="loginUser()" id="loginBtn">دخول</button>
        <div id="loginMsg" class="message"></div>
    </div>

    <div id="registerForm" class="form-box">
        <div class="input-group">
            <label>الاسم الثلاثي (سيظهر للمستر)</label>
            <input type="text" id="regName" placeholder="اكتب اسمك الحقيقي...">
        </div>
        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="regEmail" placeholder="example@gmail.com">
        </div>
        <div class="input-group">
            <label>كلمة المرور (6 أحرف أو أرقام على الأقل)</label>
            <input type="password" id="regPassword" placeholder="********">
        </div>
        <button class="btn-submit" style="background: var(--teal);" onclick="registerUser()" id="regBtn">إنشاء حسابي الآن</button>
        <div id="regMsg" class="message"></div>
    </div>
    
    <a href="index.html" class="back-home">🏠 العودة للصفحة الرئيسية</a>
</div>

<script>
    // ==========================================
    // ⚠️ انسخ كود الـ firebaseConfig الخاص بك والصقه هنا بالكامل بدلاً من هذا الكود الوهمي
    const firebaseConfig = {
  apiKey: "AIzaSyDOJMIXgFPJiQJmUvgR1sIv2NZ7_WJB4mY",
  authDomain: "alhusseiny-academy.firebaseapp.com",
  projectId: "alhusseiny-academy",
  storageBucket: "alhusseiny-academy.firebasestorage.app",
  messagingSenderId: "1048097240090",
  appId: "1:1048097240090:web:931635cccdb05213fd4da3"
};
    // ==========================================

    // تهيئة نظام Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // دالة التبديل بين الدخول وإنشاء الحساب
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-box').forEach(f => f.classList.remove('active'));
        
        if(tab === 'login') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('loginForm').classList.add('active');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('registerForm').classList.add('active');
        }
    }

    // دالة إنشاء حساب جديد
    function registerUser() {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const msgDiv = document.getElementById('regMsg');
        const btn = document.getElementById('regBtn');

        if(!name || !email || !password) {
            msgDiv.innerHTML = "<span class='msg-error'>⚠️ يرجى ملء جميع البيانات!</span>";
            return;
        }

        btn.innerText = "جاري إنشاء الحساب..."; btn.disabled = true;

        auth.createUserWithEmailAndPassword(email, password)
        .then((userCredential) => {
            // إضافة اسم الطالب للحساب
            return userCredential.user.updateProfile({ displayName: name });
        })
        .then(() => {
            msgDiv.innerHTML = "<span class='msg-success'>✅ تم إنشاء حسابك بنجاح! جاري تحويلك...</span>";
            setTimeout(() => { window.location.href = "index.html"; }, 2000); // تحويله للرئيسية
        })
        .catch((error) => {
            btn.innerText = "إنشاء حسابي الآن"; btn.disabled = false;
            let errorText = "حدث خطأ!";
            if(error.code === 'auth/email-already-in-use') errorText = "هذا الإيميل مسجل مسبقاً!";
            if(error.code === 'auth/weak-password') errorText = "كلمة المرور ضعيفة (أقل من 6 أحرف)!";
            msgDiv.innerHTML = `<span class='msg-error'>❌ ${errorText}</span>`;
        });
    }

    // دالة تسجيل الدخول
    function loginUser() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const msgDiv = document.getElementById('loginMsg');
        const btn = document.getElementById('loginBtn');

        if(!email || !password) {
            msgDiv.innerHTML = "<span class='msg-error'>⚠️ يرجى إدخال الإيميل والباسورد!</span>";
            return;
        }

        btn.innerText = "جاري الدخول..."; btn.disabled = true;

        auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
            msgDiv.innerHTML = "<span class='msg-success'>✅ أهلاً بك من جديد! جاري التحويل...</span>";
            setTimeout(() => { window.location.href = "index.html"; }, 1500); // تحويله للرئيسية
        })
        .catch((error) => {
            btn.innerText = "دخول"; btn.disabled = false;
            msgDiv.innerHTML = "<span class='msg-error'>❌ الإيميل أو كلمة المرور غير صحيحة!</span>";
        });
    }
</script>
</body>
</html>
