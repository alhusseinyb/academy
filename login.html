<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدخول | أكاديمية مستر الحسيني</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --primary: #2c3e50; --secondary: #18bc9c; --accent: #e67e22; 
            --bg: #f4f7f6; --white: #ffffff; --text: #2c3e50; 
        }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        
        .auth-container { background: var(--white); width: 100%; max-width: 450px; border-radius: 16px; padding: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-top: 6px solid var(--secondary); }
        .auth-header { text-align: center; margin-bottom: 25px; }
        .auth-header h2 { margin: 0; font-size: 1.6em; color: var(--primary); font-weight: 900; }
        .auth-header p { margin: 5px 0 0; color: #7f8c8d; font-size: 13px; font-weight: bold; }
        
        /* تبديل التبويبات */
        .auth-tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 25px; }
        .auth-tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-weight: bold; color: #7f8c8d; transition: 0.3s; font-size: 15px; }
        .auth-tab.active { color: var(--secondary); border-bottom: 3px solid var(--secondary); }

        .form-group { margin-bottom: 18px; position: relative; }
        .form-group label { display: block; font-weight: bold; font-size: 13px; color: var(--primary); margin-bottom: 8px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid #eaeded; border-radius: 8px; font-family: 'Tajawal'; font-size: 14px; box-sizing: border-box; transition: 0.3s; }
        .form-group input:focus, .form-group select:focus { border-color: var(--secondary); outline: none; background: white; }
        
        .forgot-link { display: block; text-align: left; font-size: 12px; color: #7f8c8d; text-decoration: none; font-weight: bold; margin-top: -10px; margin-bottom: 15px; transition: 0.3s; cursor: pointer; }
        .forgot-link:hover { color: var(--accent); }

        .btn-auth { background: var(--secondary); color: white; border: none; padding: 13px; width: 100%; font-size: 16px; font-weight: bold; font-family: 'Tajawal'; border-radius: 8px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(24, 188, 156, 0.2); }
        .btn-auth:hover { background: #128f76; transform: translateY(-1px); }
        
        .method-toggle { text-align: center; margin-top: 15px; font-size: 13px; color: var(--primary); font-weight: bold; cursor: pointer; text-decoration: underline; }

        /* شاشات الإخفاء والإظهار */
        .auth-view { display: none; }
        .auth-view.active { display: block; }
        
        /* لتأكيد رقم الهاتف */
        #recaptcha-container { margin: 10px 0; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <h2>👑 أكاديمية الحسيني</h2>
            <p id="authSubtitle">بوابة تسجيل الدخول الذكية للطلاب</p>
        </div>

        <div class="auth-tabs" id="authTabsBar">
            <div class="auth-tab active" onclick="switchAuthTab('login')">تسجيل الدخول</div>
            <div class="auth-tab" onclick="switchAuthTab('register')">إنشاء حساب جديد</div>
        </div>

        <div id="loginView" class="auth-view active">
            <div id="emailLoginBox">
                <div class="form-group">
                    <label>البريد الإلكتروني (Email):</label>
                    <input type="email" id="loginEmail" placeholder="name@example.com" style="direction: ltr;">
                </div>
                <div class="form-group">
                    <label>كلمة المرور (Password):</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <a class="forgot-link" onclick="handleForgotPassword()">نسيت كلمة المرور؟ 🔑</a>
                <button class="btn-auth" onclick="loginWithEmail()">دخول آمن 🔐</button>
                <div class="method-toggle" onclick="toggleLoginMethod('phone')">📱 الدخول السريع برقم الهاتف</div>
            </div>

            <div id="phoneLoginBox" style="display: none;">
                <div class="form-group">
                    <label>رقم الهاتف (مع رمز الدولة كمثال +20):</label>
                    <input type="text" id="loginPhone" placeholder="+201xxxxxxxx" style="direction: ltr;">
                </div>
                <div id="recaptcha-container"></div>
                <div id="otpBox" class="form-group" style="display: none;">
                    <label>أدخل كود التحقق المرسل لهاتفك (OTP):</label>
                    <input type="text" id="loginOTP" placeholder="------" style="letter-spacing: 5px; text-align: center;">
                </div>
                <button class="btn-auth" id="phoneSubmitBtn" onclick="handlePhoneAuth()">إرسال كود التحقق 🚀</button>
                <div class="method-toggle" onclick="toggleLoginMethod('email')">📧 العودة للدخول بالبريد الإلكتروني</div>
            </div>
        </div>

        <div id="registerView" class="auth-view">
            <div class="form-group">
                <label>الاسم الثلاثي للطالب (بالعربية):</label>
                <input type="text" id="regName" placeholder="محمد أحمد محمود">
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني الخاص بك:</label>
                <input type="email" id="regEmail" placeholder="student@example.com" style="direction: ltr;">
            </div>
            <div class="form-group">
                <label>اختر مرحلتك الدراسية الحالية:</label>
                <select id="regGrade">
                    <option value="prep1">الصف الأول الإعدادي 📚</option>
                    <option value="prep2">الصف الثاني الإعدادي 📚</option>
                    <option value="prep3">الصف الثالث الإعدادي 📚</option>
                </select>
            </div>
            <div class="form-group">
                <label>إنشاء كلمة مرور للحساب:</label>
                <input type="password" id="regPassword" placeholder="لا تقل عن 6 خانات">
            </div>
            <button class="btn-auth" onclick="registerNewStudent()">إنشاء الحساب واعتاده 🎯</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDOJMIXgFPJiQJmUvgR1sIv2NZ7_WJB4mY",
            authDomain: "alhusseiny-academy.firebaseapp.com",
            projectId: "alhusseiny-academy",
            storageBucket: "alhusseiny-academy.firebasestorage.app",
            messagingSenderId: "1048097240090",
            appId: "1:1048097240090:web:931635cccdb05213fd4da3"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const ADMIN_EMAIL = "h.y.s249.hy@gmail.com";
        let confirmationResult = null; // لحفظ نتيجة كود الهاتف

        // نظام التبديل بين الدخول والتسجيل
        function switchAuthTab(target) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-view').forEach(v => v.classList.remove('active'));
            
            if(target === 'login') {
                document.getElementById('loginView').classList.add('active');
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
                document.getElementById('authSubtitle').innerText = "بوابة تسجيل الدخول الذكية للطلاب";
            } else {
                document.getElementById('registerView').classList.add('active');
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('authSubtitle').innerText = "انضم الآن لأقوى منصة تعليمية وتأسيسية";
            }
        }

        // التبديل بين الإيميل والهاتف داخل شاشة الدخول
        function toggleLoginMethod(method) {
            if(method === 'phone') {
                document.getElementById('emailLoginBox').style.display = 'none';
                document.getElementById('phoneLoginBox').style.display = 'block';
                initRecaptcha();
            } else {
                document.getElementById('emailLoginBox').style.display = 'block';
                document.getElementById('phoneLoginBox').style.display = 'none';
            }
        }

        // تهيئة حماية الـ Recaptcha لرقم الهاتف
        function initRecaptcha() {
            if (!window.recaptchaVerifier) {
                window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                    'size': 'invisible'
                });
            }
        }

        // 1️⃣ تسجيل الدخول بالبريد الإلكتروني
        function loginWithEmail() {
            const email = document.getElementById("loginEmail").value.trim();
            const pass = document.getElementById("loginPassword").value.trim();
            if(!email || !pass) { alert("⚠️ يرجى كتابة الإيميل والباسورد!"); return; }

            auth.signInWithEmailAndPassword(email, pass).then((userCredential) => {
                redirectUser(userCredential.user);
            }).catch(err => alert("❌ خطأ في الدخول: " + err.message));
        }

        // 2️⃣ تسجيل الدخول / التحقق برقم الهاتف
        function handlePhoneAuth() {
            const phone = document.getElementById("loginPhone").value.trim();
            if(!phone) { alert("⚠️ اكتب رقم الهاتف كاملاً مع رمز الدولة!"); return; }

            if (!confirmationResult) {
                // المرحلة الأولى: إرسال الـ OTP
                const appVerifier = window.recaptchaVerifier;
                auth.signInWithPhoneNumber(phone, appVerifier).then((result) => {
                    confirmationResult = result;
                    document.getElementById("otpBox").style.display = "block";
                    document.getElementById("phoneSubmitBtn").innerText = "✔️ تأكيد الكود والدخول";
                    alert("🚀 تم إرسال كود التحقق لهاتفك في رسالة SMS!");
                }).catch(err => alert("خطأ في الإرسال: " + err.message));
            } else {
                // المرحلة الثانية: تأكيد الـ OTP ودخول الطالب
                const code = document.getElementById("loginOTP").value.trim();
                if(!code) { alert("⚠️ أدخل كود الـ OTP!"); return; }

                confirmationResult.confirm(code).then((userCredential) => {
                    redirectUser(userCredential.user);
                }).catch(err => alert("❌ كود التحقق خاطئ أو منتهي الصلاحية!"));
            }
        }

        // 3️⃣ إنشاء حساب جديد للطالب
        function registerNewStudent() {
            const name = document.getElementById("regName").value.trim();
            const email = document.getElementById("regEmail").value.trim();
            const grade = document.getElementById("regGrade").value;
            const pass = document.getElementById("regPassword").value.trim();

            if(!name || !email || !pass) { alert("⚠️ يرجى ملء كافة الخانات المطلوبة!"); return; }
            if(pass.length < 6) { alert("⚠️ كلمة المرور يجب ألا تقل عن 6 خانات!"); return; }

            auth.createUserWithEmailAndPassword(email, pass).then((userCredential) => {
                // حفظ الاسم في الـ Auth Profile
                userCredential.user.updateProfile({ displayName: name }).then(() => {
                    // حفظ بيانات الطالب والمرحلة في الـ Firestore
                    db.collection("students").doc(userCredential.user.uid).set({
                        name: name,
                        email: email,
                        grade: grade,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    }).then(() => {
                        alert(`🎉 أهلاً بك يا ${name}! تم إنشاء حسابك بنجاح وجاري توجيهك للوحة التحكم.`);
                        window.location.href = "dashboard.html";
                    });
                });
            }).catch(err => alert("❌ خطأ أثناء التسجيل: " + err.message));
        }

        // 🔑 4️⃣ خاصية نسيت كلمة المرور (إرسال إيميل الاستعادة)
        function handleForgotPassword() {
            const email = document.getElementById("loginEmail").value.trim();
            if(!email) { alert("⚠️ يرجى كتابة بريدك الإلكتروني في خانة الإيميل أولاً، ثم الضغط على نسيت كلمة المرور لإرسال رابط الاستعادة!"); return; }

            auth.sendPasswordResetEmail(email).then(() => {
                alert(`📧 تم إرسال رابط إعادة تعيين كلمة المرور بنجاح إلى: ${email}\nيرجى مراجعة بريدك الوارد أو رسائل الـ Spam.`);
            }).catch(err => alert("خطأ: " + err.message));
        }

        // الموجه الذكي (توجيه المستر للإدارة والطالب للداشبورد)
        function redirectUser(user) {
            if(user.email === ADMIN_EMAIL) {
                window.location.href = "admin.html";
            } else {
                window.location.href = "dashboard.html";
            }
        }
    </script>
</body>
</html>
